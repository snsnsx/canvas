<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>onCanvas</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png">
<link rel="alternate icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff">
<style>
  :root {
    color-scheme: light;
    --app-bg: #f7f8f7;
    --paper: #ffffff;
    --text: #151515;
    --muted: #6b6f6d;
    --line: rgba(21, 21, 21, 0.11);
    --line-strong: rgba(21, 21, 21, 0.18);
    --panel: rgba(255, 255, 255, 0.86);
    --panel-solid: #ffffff;
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.10), 0 2px 10px rgba(0, 0, 0, 0.05);
    --accent: #10a37f;
    --accent-soft: rgba(57, 77, 254, 0.13);
    --accent-line: rgba(57, 77, 254, 0.25);
    --danger: #cf2e2e;
    --ui-strong: #151515;
    --grid: rgba(21, 21, 21, 0.065);
    --grid-strong: rgba(21, 21, 21, 0.15);
    --radius: 8px;
    --control: 32px;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--app-bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
  }

  button,
  input {
    font: inherit;
  }

  button {
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 50% -20%, rgba(16, 163, 127, 0.06), transparent 34%),
      var(--app-bg);
  }

  .stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: var(--paper);
    cursor: crosshair;
  }

  .stage.erase {
    cursor: none;
  }

  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #back {
    z-index: 1;
    background: var(--paper);
  }

  #ink {
    z-index: 2;
    pointer-events: none;
  }

  #overlay {
    z-index: 3;
    touch-action: none;
  }

  .toolbar {
    position: fixed;
    z-index: 20;
    top: max(18px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    width: max-content;
    max-width: calc(100vw - 24px);
    display: flex;
    align-items: stretch;
    gap: 4px;
    padding: 6px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
  }

  .toolbar::-webkit-scrollbar {
    display: none;
  }

  .group {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: max-content;
    padding: 0 5px;
    border-right: 1px solid var(--line);
  }

  .group:last-child {
    border-right: 0;
    padding-right: 2px;
  }

  .group-label {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .swatches,
  .sizes,
  .segmented {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .btn,
  .swatch,
  .size {
    width: var(--control);
    height: var(--control);
    border: 1px solid transparent;
    border-radius: 999px;
    display: inline-grid;
    place-items: center;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
  }

  .btn {
    padding: 0 10px;
    width: auto;
    min-width: var(--control);
    font-size: 13px;
    font-weight: 570;
    white-space: nowrap;
  }

  .btn.icon {
    width: var(--control);
    padding: 0;
    font-size: 16px;
  }

  .btn.icon .m-icon {
    width: 21px;
    height: 21px;
    display: block;
    overflow: visible;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.18));
    transition: transform 140ms ease, filter 140ms ease;
  }

  .btn.icon:hover .m-icon,
  .btn.icon.on .m-icon {
    transform: translateY(-1px);
    filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.18));
  }

  .btn.icon:disabled .m-icon {
    filter: grayscale(0.75) opacity(0.55);
  }

  .m-edge {
    stroke: rgba(29, 34, 32, 0.22);
    stroke-width: 1;
  }

  .m-highlight {
    fill: rgba(255, 255, 255, 0.62);
  }

  .btn:hover {
    background: rgba(21, 21, 21, 0.055);
  }

  .btn:focus-visible,
  .swatch:focus-visible,
  .size:focus-visible {
    outline: 2px solid var(--accent-line);
    outline-offset: 2px;
  }

  .btn.on {
    border-color: var(--accent-line);
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 1px rgba(16, 163, 127, 0.08);
  }

  .btn:active,
  .swatch:active,
  .size:active {
    transform: translateY(1px);
  }

  .btn:disabled {
    opacity: 0.34;
    cursor: default;
    transform: none;
  }

  .btn.danger {
    color: var(--danger);
  }

  .swatch {
    padding: 0;
  }

  .swatch .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(0, 0, 0, 0.16);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
    transition: box-shadow 120ms ease, transform 120ms ease;
  }

  .swatch.hl .dot {
    width: 20px;
    height: 12px;
    border-radius: 999px;
  }

  .swatch:hover .dot {
    box-shadow:
      0 0 0 5px rgba(21, 21, 21, 0.055),
      inset 0 0 0 1px rgba(255, 255, 255, 0.45);
  }

  .swatch.sel .dot {
    box-shadow:
      0 0 0 5px var(--accent-line),
      inset 0 0 0 1px rgba(255, 255, 255, 0.45);
  }

  .size .pip {
    display: block;
    border-radius: 50%;
    background: var(--text);
    transition: box-shadow 120ms ease, transform 120ms ease;
  }

  .size:hover .pip {
    box-shadow: 0 0 0 7px rgba(21, 21, 21, 0.055);
  }

  .size.sel .pip {
    box-shadow:
      0 0 0 4px var(--accent-line);
  }

  .status {
    gap: 8px;
  }

  .presence {
    border: 0;
    min-height: var(--control);
    min-width: 58px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(21, 21, 21, 0.045);
    color: var(--muted);
    font-size: 13px;
    font-weight: 560;
    white-space: nowrap;
    cursor: pointer;
    transition: background 120ms ease, transform 120ms ease;
  }

  .presence:hover {
    background: rgba(21, 21, 21, 0.065);
  }

  .presence:active {
    transform: translateY(1px);
  }

  .presence-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12);
  }

  .vbar {
    position: fixed;
    z-index: 12;
    top: calc(max(12px, env(safe-area-inset-top)) + 74px);
    right: max(12px, env(safe-area-inset-right));
    bottom: max(12px, env(safe-area-inset-bottom));
    width: 10px;
    border-radius: 999px;
    background: rgba(21, 21, 21, 0.045);
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease;
  }

  .vbar.show {
    opacity: 1;
    pointer-events: auto;
  }

  .thumb {
    position: absolute;
    left: 2px;
    right: 2px;
    min-height: 28px;
    border-radius: 999px;
    background: rgba(21, 21, 21, 0.34);
    cursor: grab;
    touch-action: none;
  }

  .thumb:active {
    cursor: grabbing;
  }

  .eraser-cursor {
    position: absolute;
    z-index: 11;
    width: 28px;
    height: 28px;
    border: 1.5px solid rgba(21, 21, 21, 0.72);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.32);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.72);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: opacity 80ms ease;
  }

  .eraser-cursor.show {
    opacity: 1;
  }

  .toast {
    position: fixed;
    z-index: 30;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    max-width: min(420px, calc(100vw - 32px));
    transform: translate(-50%, 12px);
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel-solid);
    box-shadow: var(--shadow);
    color: var(--text);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease, transform 160ms ease;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (max-width: 760px) {
    :root {
      --control: 31px;
    }

    .toolbar {
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      width: max-content;
      max-width: calc(100vw - 16px);
      padding: 5px;
      gap: 3px;
    }

    .group {
      padding: 0 4px;
    }

    .btn {
      padding: 0 8px;
      font-size: 12px;
    }

    .vbar {
      top: calc(max(8px, env(safe-area-inset-top)) + 62px);
      right: max(8px, env(safe-area-inset-right));
    }
  }
</style>
</head>
<body>
<main class="app" aria-label="onCanvas">
  <section id="stage" class="stage" aria-label="Рабочая область доски">
    <canvas id="back"></canvas>
    <canvas id="ink"></canvas>
    <canvas id="overlay"></canvas>
    <div id="eraserCursor" class="eraser-cursor" aria-hidden="true"></div>
    <div id="vbar" class="vbar" aria-hidden="true">
      <div id="thumb" class="thumb"></div>
    </div>
  </section>

  <header class="toolbar" aria-label="Инструменты доски">
    <div class="group" aria-label="Цвета ручки">
      <span class="group-label">Перо</span>
      <div id="penColors" class="swatches"></div>
    </div>

    <div class="group" aria-label="Цвета маркера">
      <span class="group-label">Маркер</span>
      <div id="hlColors" class="swatches"></div>
    </div>

    <div class="group" aria-label="Инструменты">
      <button id="eraserBtn" class="btn icon" type="button" aria-pressed="false" aria-label="Ластик" title="Ластик (E)">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-eraser-body" x1="5" y1="4" x2="19" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFD6E7"/>
              <stop offset="0.52" stop-color="#FF8AB8"/>
              <stop offset="1" stop-color="#D0BCFF"/>
            </linearGradient>
            <linearGradient id="i-eraser-cap" x1="9" y1="14" x2="18" y2="21" gradientUnits="userSpaceOnUse">
              <stop stop-color="#E6FFFA"/>
              <stop offset="1" stop-color="#80CBC4"/>
            </linearGradient>
          </defs>
          <path d="M6.3 12.5 12.5 6.3c.7-.7 1.9-.7 2.6 0l3.1 3.1c.7.7.7 1.9 0 2.6l-6.2 6.2c-.7.7-1.9.7-2.6 0l-3.1-3.1c-.7-.7-.7-1.9 0-2.6Z" fill="url(#i-eraser-body)" class="m-edge"/>
          <path d="m11.4 17 4.8-4.8 2 2c.7.7.7 1.8 0 2.5L16 18.9H9.4l2-1.9Z" fill="url(#i-eraser-cap)" class="m-edge"/>
          <path d="M8.2 12.5 13 7.7c.4-.4 1-.4 1.4 0" fill="none" stroke="rgba(255,255,255,.72)" stroke-width="1.35" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="sizes" class="sizes" aria-label="Толщина линии"></div>
    </div>

    <div class="group" aria-label="Фон доски">
      <span class="group-label">Фон</span>
      <div id="gridSeg" class="segmented">
        <button class="btn icon" type="button" data-grid="none" aria-pressed="false" aria-label="Без сетки" title="Без сетки">
          <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="i-none-paper" x1="5" y1="4" x2="19" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FFFFFF"/>
                <stop offset="1" stop-color="#DFF7EE"/>
              </linearGradient>
            </defs>
            <rect x="5" y="4.5" width="14" height="15" rx="4" fill="url(#i-none-paper)" class="m-edge"/>
            <path d="M8.7 7.7h4.8" stroke="rgba(255,255,255,.85)" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="2.2" fill="#10A37F"/>
            <circle cx="11.3" cy="11.2" r=".75" class="m-highlight"/>
          </svg>
        </button>
        <button class="btn icon" type="button" data-grid="grid" aria-pressed="false" aria-label="Клетка" title="Клетка">
          <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="i-grid-tile" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#D7FCE8"/>
                <stop offset=".55" stop-color="#8EE8C8"/>
                <stop offset="1" stop-color="#B8C7FF"/>
              </linearGradient>
            </defs>
            <rect x="4.5" y="4.5" width="15" height="15" rx="4" fill="url(#i-grid-tile)" class="m-edge"/>
            <path d="M9.5 5v14M14.5 5v14M5 9.5h14M5 14.5h14" stroke="rgba(20,73,66,.48)" stroke-width="1.05"/>
            <path d="M7.5 6.8h5.2" stroke="rgba(255,255,255,.72)" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn icon" type="button" data-grid="dots" aria-pressed="false" aria-label="Точки" title="Точки">
          <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <defs>
              <radialGradient id="i-dot-mint" cx="35%" cy="30%" r="70%">
                <stop stop-color="#FFFFFF"/>
                <stop offset=".38" stop-color="#7FFFD4"/>
                <stop offset="1" stop-color="#10A37F"/>
              </radialGradient>
              <radialGradient id="i-dot-amber" cx="35%" cy="30%" r="70%">
                <stop stop-color="#FFF8D6"/>
                <stop offset="1" stop-color="#F9AB00"/>
              </radialGradient>
            </defs>
            <circle cx="7" cy="7" r="2" fill="url(#i-dot-mint)" class="m-edge"/>
            <circle cx="12" cy="12" r="2.15" fill="#D0BCFF" class="m-edge"/>
            <circle cx="17" cy="7" r="1.75" fill="url(#i-dot-amber)" class="m-edge"/>
            <circle cx="7" cy="17" r="1.75" fill="#A8C7FA" class="m-edge"/>
            <circle cx="17" cy="17" r="2" fill="#FFB1C8" class="m-edge"/>
          </svg>
        </button>
        <button class="btn icon" type="button" data-grid="lines" aria-pressed="false" aria-label="Линейка" title="Линейка">
          <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="i-lines-card" x1="5" y1="4" x2="19" y2="20" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FFF7D6"/>
                <stop offset=".58" stop-color="#FFD966"/>
                <stop offset="1" stop-color="#FFB74D"/>
              </linearGradient>
            </defs>
            <rect x="5" y="4.5" width="14" height="15" rx="4" fill="url(#i-lines-card)" class="m-edge"/>
            <path d="M8 9h8M8 12h8M8 15h8" stroke="rgba(92,59,18,.55)" stroke-width="1.35" stroke-linecap="round"/>
            <path d="M8 7.1h5" stroke="rgba(255,255,255,.75)" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="group" aria-label="Файлы">
      <button id="imgBtn" class="btn icon" type="button" aria-label="Добавить изображение" title="Добавить изображение">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-image-frame" x1="4" y1="5" x2="20" y2="19" gradientUnits="userSpaceOnUse">
              <stop stop-color="#EAF2FF"/>
              <stop offset="1" stop-color="#A8C7FA"/>
            </linearGradient>
            <linearGradient id="i-image-hill" x1="7" y1="12" x2="18" y2="19" gradientUnits="userSpaceOnUse">
              <stop stop-color="#AEE8C8"/>
              <stop offset="1" stop-color="#10A37F"/>
            </linearGradient>
          </defs>
          <rect x="4.5" y="5" width="13.5" height="13.5" rx="3.2" fill="url(#i-image-frame)" class="m-edge"/>
          <circle cx="8.7" cy="9.1" r="1.8" fill="#FFD966" class="m-edge"/>
          <path d="m6.2 17 4.3-4.7 2.6 2.7 1.6-1.7 3.3 3.7H6.2Z" fill="url(#i-image-hill)"/>
          <circle cx="17.4" cy="16.8" r="4.2" fill="#D0BCFF" class="m-edge"/>
          <path d="M17.4 14.6V19M15.2 16.8h4.4" stroke="#4A336D" stroke-width="1.35" stroke-linecap="round"/>
          <path d="M7 6.9h5" stroke="rgba(255,255,255,.72)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="exportBtn" class="btn icon" type="button" aria-label="Экспортировать PNG" title="Экспортировать PNG">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-export-arrow" x1="12" y1="4" x2="12" y2="15" gradientUnits="userSpaceOnUse">
              <stop stop-color="#B8F7D4"/>
              <stop offset="1" stop-color="#10A37F"/>
            </linearGradient>
            <linearGradient id="i-export-tray" x1="5" y1="13" x2="19" y2="21" gradientUnits="userSpaceOnUse">
              <stop stop-color="#E8EAED"/>
              <stop offset="1" stop-color="#A8C7FA"/>
            </linearGradient>
          </defs>
          <path d="M12 4.5v9.1" stroke="url(#i-export-arrow)" stroke-width="3" stroke-linecap="round"/>
          <path d="m8.5 10.6 3.5 3.5 3.5-3.5" fill="none" stroke="#087A62" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 14.8v2.8c0 1 .8 1.9 1.9 1.9h8.2c1 0 1.9-.8 1.9-1.9v-2.8" fill="none" stroke="url(#i-export-tray)" stroke-width="3" stroke-linecap="round"/>
          <path d="M8.4 17.4h7.2" stroke="rgba(255,255,255,.72)" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="group" aria-label="История">
      <button id="undoBtn" class="btn icon" type="button" title="Отменить (Ctrl/Cmd+Z)" disabled aria-label="Отменить">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-undo" x1="5" y1="7" x2="19" y2="18" gradientUnits="userSpaceOnUse">
              <stop stop-color="#D0BCFF"/>
              <stop offset="1" stop-color="#6750A4"/>
            </linearGradient>
          </defs>
          <path d="M9.5 8.2 5.6 12l3.9 3.8" fill="none" stroke="url(#i-undo)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.4 12h6.8c3.1 0 5.1 1.9 5.1 4.5" fill="none" stroke="#6750A4" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M7.2 11.1h5.3" stroke="rgba(255,255,255,.7)" stroke-width="1.15" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="redoBtn" class="btn icon" type="button" title="Повторить (Ctrl/Cmd+Y)" disabled aria-label="Повторить">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-redo" x1="19" y1="7" x2="5" y2="18" gradientUnits="userSpaceOnUse">
              <stop stop-color="#A8C7FA"/>
              <stop offset="1" stop-color="#0B57D0"/>
            </linearGradient>
          </defs>
          <path d="m14.5 8.2 3.9 3.8-3.9 3.8" fill="none" stroke="url(#i-redo)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17.6 12h-6.8c-3.1 0-5.1 1.9-5.1 4.5" fill="none" stroke="#0B57D0" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M16.8 11.1h-5.3" stroke="rgba(255,255,255,.7)" stroke-width="1.15" stroke-linecap="round"/>
        </svg>
      </button>
      <button id="clearBtn" class="btn icon danger" type="button" aria-label="Очистить доску" title="Очистить доску">
        <svg class="m-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="i-clear-bin" x1="7" y1="5" x2="17" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFDAD6"/>
              <stop offset=".55" stop-color="#FF8A80"/>
              <stop offset="1" stop-color="#BA1A1A"/>
            </linearGradient>
          </defs>
          <path d="M8 8.5h8l-.6 9.4c-.1 1-1 1.8-2 1.8h-2.8c-1 0-1.9-.8-2-1.8L8 8.5Z" fill="url(#i-clear-bin)" class="m-edge"/>

    <div class="group status" aria-label="Статус">
      <button id="presenceBtn" class="presence" type="button" title="Обновить страницу" aria-label="Обновить страницу">
        <span class="presence-dot" aria-hidden="true"></span>
        <span id="userCount">0</span>
        <span class="sr-only">онлайн</span>
      </button>
    </div>
  </header>

  <input id="fileInput" class="sr-only" type="file" accept="image/*">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</main>

<script type="module">
import { BoardStorage } from './storage.js';
import { CanvasRenderer } from './canvas.js';
import { NetworkManager } from './network.js';
import { HistoryManager } from './history.js';
import { ToolManager } from './tools.js';

(function() {
  "use strict";

  const storage = new BoardStorage();

  const renderer = new CanvasRenderer(storage);
  // Удалённые операции и undo/redo только помечают кадр «грязным» —
  // фактическая перерисовка коалесится в один вызов на animation frame.
  const network = new NetworkManager(
    storage,
    () => renderer.scheduleRender(),
    (point) => renderer.focusWorldPoint(point)
  );
  network.onRemoteCursor = (clientId, point) => renderer.setRemoteCursor(clientId, point);
  const history = new HistoryManager(storage, network, () => renderer.scheduleRender());
  const tools = new ToolManager(storage, renderer, network, history);
  document.getElementById('presenceBtn')?.addEventListener('click', () => window.location.reload());

  network.init();

  // Expose globally for testing/debugging
  window._board = { storage, renderer, network, history, tools };
})();
</script>
</body>
